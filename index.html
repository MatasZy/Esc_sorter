<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC 2026 Sorter</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #111, #1e0033);
    color: white;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.song {
    display: inline-block;
    width: 40%;
    padding: 20px;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 18px;
}

.song:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

#progress {
    margin-top: 15px;
    opacity: 0.8;
}

#results {
    margin-top: 25px;
}
</style>
</head>

<body>

<h1>🎤 Eurovizijos 2026 Sorter</h1>
<p>Pasirink labiau patinkančią šalį</p>

<div id="battle"></div>
<div id="progress"></div>
<div id="results"></div>

<script>

// --- Dalyviai ---
let items = [
    "🇦🇱 ALBANIA — Alis — Nán",
    "🇦🇺 AUSTRALIA — Delta Goodrem — Eclipse",
    "🇦🇹 AUSTRIA — Cosmó — Tanzschein",
    "🇧🇪 BELGIUM — Essyla — Dancing On The Ice",
    "🇧🇬 BULGARIA — Dara — Bangaranga",
    "🇭🇷 CROATIA — Lelek — Andromeda",
    "🇨🇾 CYPRUS — Antigoni — Jalla",
    "🇩🇰 DENMARK — Søren Torpegaard Lund — Før Vi Går Hjem",
    "🇪🇪 ESTONIA — Vanilla Ninja — Too Epic To Be True",
    "🇫🇮 FINLAND — Linda & Pete — Liekinheitin",
    "🇩🇪 GERMANY — Sarah Engels — Fire",
    "🇬🇷 GREECE — Akylas — Ferto",
    "🇮🇹 ITALY — Sal Da Vinci — Per Sempre Si",
    "🇱🇻 LATVIA — Atvara — Ēnā",
    "🇱🇹 LITHUANIA — Lion Ceccah — Sólo Quiero Más",
    "🇱🇺 LUXEMBOURG — Eva Marija — Mother Nature",
    "🇲🇩 MOLDOVA — Satoshi — Viva, Moldova!",
    "🇲🇪 MONTENEGRO — Tamara Živković — Nova Zora",
    "🇳🇴 NORWAY — Jonas Lovv — Ya Ya Ya",
    "🇷🇸 SERBIA — Lavina — Kraj Mene",
    "🇺🇦 UKRAINE — Lelėka — Ridnym"
];

let totalComparisons = 0;
let comparisons = 0;


// --- Shuffle funkcija ---
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}


// --- Palyginimų kiekio įvertinimas ---
function estimateComparisons(n) {
    return Math.ceil(n * Math.log2(n));
}


// --- Interaktyvus Merge Sort ---
async function interactiveMergeSort(arr) {
    if (arr.length <= 1) return arr;

    const mid = Math.floor(arr.length / 2);
    const left = await interactiveMergeSort(arr.slice(0, mid));
    const right = await interactiveMergeSort(arr.slice(mid));

    return await merge(left, right);
}


function merge(left, right) {
    return new Promise(resolve => {
        let result = [];

        function compare() {
            if (!left.length) {
                resolve(result.concat(right));
                return;
            }
            if (!right.length) {
                resolve(result.concat(left));
                return;
            }

            showBattle(left[0], right[0], choice => {
                comparisons++;
                updateProgress();

                if (choice === 0) {
                    result.push(left.shift());
                } else {
                    result.push(right.shift());
                }
                compare();
            });
        }

        compare();
    });
}


// --- Parodo dvikovą ---
function showBattle(a, b, callback) {
    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="choose(0)">${a}</div>
        <div class="song" onclick="choose(1)">${b}</div>
    `;
    window.choose = callback;
}


// --- Atnaujina progresą ---
function updateProgress() {
    document.getElementById("progress").innerText =
        "Progresas: " + Math.round((comparisons / totalComparisons) * 100) + "%";
}


// --- Parodo rezultatus ---
function showResults(sorted) {
    document.getElementById("battle").innerHTML = "";
    document.getElementById("progress").innerHTML = "";

    let html = "<h2>🏆 Tavo Galutinis TOP</h2>";
    sorted.forEach((item, i) => {
        html += `<p>${i + 1}. ${item}</p>`;
    });

    document.getElementById("results").innerHTML = html;
}


// --- Start ---
async function start() {
    shuffle(items); // sumaišom pradžioje
    totalComparisons = estimateComparisons(items.length);
    comparisons = 0;
    updateProgress();

    const sorted = await interactiveMergeSort(items);
    showResults(sorted);
}

start();

</script>

</body>
</html>
