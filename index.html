<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovizijos 2026 Tikslus Sorter</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #1e1e2f, #302b63, #24243e);
    color: white;
    margin: 0;
    padding: 20px;
}

.song {
    display: inline-block;
    width: 40%;
    padding: 20px;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.song:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

button {
    padding: 10px 20px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ff00cc;
    color: white;
    font-size: 16px;
}

#progress {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>
<body>

<h1>🎤 Eurovizijos 2026 Dainų Sorter</h1>
<p>Pasirink labiau patinkančią šalį</p>

<div id="battle"></div>
<div id="progress"></div>
<div id="results"></div>
<button onclick="restart()">Perkrauti</button>

<script>
let songs = [
    "🇱🇹 Lietuva",
    "🇸🇪 Švedija",
    "🇳🇴 Norvegija",
    "🇫🇮 Suomija",
    "🇮🇹 Italija",
    "🇪🇸 Ispanija",
    "🇫🇷 Prancūzija",
    "🇩🇪 Vokietija"
];

let list = [];
let comparisons = 0;
let totalComparisons = 0;
let left = [];
let right = [];
let merged = [];

function mergeSort(arr) {
    if (arr.length <= 1) return arr;
    const mid = Math.floor(arr.length / 2);
    return [mergeSort(arr.slice(0, mid)), mergeSort(arr.slice(mid))];
}

function countComparisons(n) {
    return Math.ceil(n * Math.log2(n));
}

function start() {
    list = mergeSort(songs);
    totalComparisons = countComparisons(songs.length);
    comparisons = 0;
    nextMerge();
}

function nextMerge() {
    if (list.length === 1) {
        showResults(list[0]);
        return;
    }

    left = list.shift();
    right = list.shift();
    merged = [];
    compareNext();
}

function compareNext() {
    if (left.length === 0) {
        merged = merged.concat(right);
        finishMerge();
        return;
    }
    if (right.length === 0) {
        merged = merged.concat(left);
        finishMerge();
        return;
    }

    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="choose(0)">${left[0]}</div>
        <div class="song" onclick="choose(1)">${right[0]}</div>
    `;
}

function choose(side) {
    comparisons++;
    if (side === 0) {
        merged.push(left.shift());
    } else {
        merged.push(right.shift());
    }

    document.getElementById("progress").innerText =
        "Progresas: " + Math.round((comparisons / totalComparisons) * 100) + "%";

    compareNext();
}

function finishMerge() {
    list.push(merged);
    nextMerge();
}

function showResults(finalList) {
    document.getElementById("battle").innerHTML = "";
    document.getElementById("progress").innerHTML = "";

    let html = "<h2>🏆 Tavo Galutinis TOP</h2>";
    finalList.forEach((song, i) => {
        html += `<p>${i + 1}. ${song}</p>`;
    });

    document.getElementById("results").innerHTML = html;
}

function restart() {
    document.getElementById("results").innerHTML = "";
    start();
}

start();
</script>

</body>
</html>
