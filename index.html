<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovizijos 2026 Dainų Sorter</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #1e1e2f, #302b63, #24243e);
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

.container {
    margin-top: 30px;
}

.song {
    display: inline-block;
    width: 40%;
    padding: 20px;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.song:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.05);
}

button {
    padding: 10px 20px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ff00cc;
    color: white;
    font-size: 16px;
}

#results {
    margin-top: 30px;
}
</style>
</head>
<body>

<h1>🎤 Eurovizijos 2026 Dainų Sorter</h1>
<p>Pasirink labiau patinkančią dainą ir sudaryk savo asmeninį TOP!</p>

<div class="container" id="battle"></div>

<div id="results"></div>

<button onclick="restart()">Perkrauti</button>

<script>
let songs = [
    "🇱🇹 Lietuva – (Artist / Song)",
    "🇸🇪 Švedija – (Artist / Song)",
    "🇳🇴 Norvegija – (Artist / Song)",
    "🇫🇮 Suomija – (Artist / Song)",
    "🇮🇹 Italija – (Artist / Song)",
    "🇪🇸 Ispanija – (Artist / Song)",
    "🇫🇷 Prancūzija – (Artist / Song)",
    "🇩🇪 Vokietija – (Artist / Song)"
];

let queue = [...songs];
let sorted = [];

function nextBattle() {
    if (queue.length <= 1) {
        if (queue.length === 1) sorted.push(queue.shift());
        showResults();
        return;
    }

    let a = queue.shift();
    let b = queue.shift();

    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="choose('${a}', '${b}')">${a}</div>
        <div class="song" onclick="choose('${b}', '${a}')">${b}</div>
    `;
}

function choose(winner, loser) {
    sorted.push(winner);
    queue.unshift(loser);
    nextBattle();
}

function showResults() {
    document.getElementById("battle").innerHTML = "";
    let html = "<h2>🏆 Tavo Asmeninis TOP</h2>";
    sorted.forEach((song, index) => {
        html += `<p>${index + 1}. ${song}</p>`;
    });
    document.getElementById("results").innerHTML = html;
}

function restart() {
    queue = [...songs];
    sorted = [];
    document.getElementById("results").innerHTML = "";
    nextBattle();
}

nextBattle();
</script>

</body>
</html>
