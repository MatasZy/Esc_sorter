<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC 2026 Sorter</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2a2a4f);
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.song {
    display: inline-block;
    width: 250px;
    padding: 15px;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    transition: 0.2s;
    vertical-align: top;
    cursor: pointer;
}

.song:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.03);
}

.song-title {
    font-size: 16px;
    margin-bottom: 10px;
}

iframe {
    border-radius: 12px;
    width: 100%;
    height: 250px;
}

#progress {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.8;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    opacity: 0.8;
}

@media (max-width: 600px) {
    .song {
        width: 90%;
    }
}
</style>
</head>

<body>

<h1>🎤 Eurovizijos 2026 Sorter</h1>
<p>Paklausyk ir pasirink labiau patinkančią dainą</p>

<div id="battle"></div>
<div id="progress"></div>
<div id="results"></div>
<button onclick="restart()">🔄 Restart</button>

<script>
let items = [
    { name: "🇦🇱 ALBANIA — Alis — Nán", spotify: "40vsOMljwhHCibpToRULGo" },
    { name: "🇦🇺 AUSTRALIA — Delta Goodrem — Eclipse", spotify: "" },
    { name: "🇦🇹 AUSTRIA — Cosmó — Tanzschein", spotify: "" },
    { name: "🇧🇪 BELGIUM — Essyla — Dancing On The Ice", spotify: "" },
    { name: "🇧🇬 BULGARIA — Dara — Bangaranga", spotify: "" },
    { name: "🇭🇷 CROATIA — Lelek — Andromeda", spotify: "" },
    { name: "🇨🇾 CYPRUS — Antigoni — Jalla", spotify: "" },
    { name: "🇩🇰 DENMARK — Søren Torpegaard Lund — Før Vi Går Hjem", spotify: "" },
    { name: "🇪🇪 ESTONIA — Vanilla Ninja — Too Epic To Be True", spotify: "" },
    { name: "🇫🇮 FINLAND — Linda & Pete — Liekinheitin", spotify: "0k2NxIVax5tnGSCeruFyEL" },
    { name: "🇩🇪 GERMANY — Sarah Engels — Fire", spotify: "" },
    { name: "🇬🇷 GREECE — Akylas — Ferto", spotify: "" },
    { name: "🇮🇹 ITALY — Sal Da Vinci — Per Sempre Si", spotify: "" },
    { name: "🇱🇻 LATVIA — Atvara — Ēnā", spotify: "" },
    { name: "🇱🇹 LITHUANIA — Lion Ceccah — Sólo Quiero Más", spotify: "" },
    { name: "🇱🇺 LUXEMBOURG — Eva Marija — Mother Nature", spotify: "" },
    { name: "🇲🇹 MALTA — Aidan — Bella", spotify: "" },
    { name: "🇲🇩 MOLDOVA — Satoshi — Viva, Moldova!", spotify: "" },
    { name: "🇲🇪 MONTENEGRO — Tamara Živković — Nova Zora", spotify: "" },
    { name: "🇳🇴 NORWAY — Jonas Lovv — Ya Ya Ya", spotify: "" },
    { name: "🇷🇸 SERBIA — Lavina — Kraj Mene", spotify: "" },
    { name: "🇺🇦 UKRAINE — Lelėka — Ridnym", spotify: "" }
];

let totalComparisons = 0;
let comparisons = 0;
let resolver = null;

function estimateComparisons(n) {
    return Math.ceil(n * Math.log2(n));
}

function updateProgress() {
    document.getElementById("progress").innerHTML =
        `Progresas: ${comparisons} / ~${totalComparisons}`;
}

function choose(index) {
    if (resolver) {
        resolver(index);
        resolver = null;
    }
}

async function interactiveMergeSort(arr) {
    if (arr.length <= 1) return arr;

    const mid = Math.floor(arr.length / 2);
    const left = await interactiveMergeSort(arr.slice(0, mid));
    const right = await interactiveMergeSort(arr.slice(mid));

    return await merge(left, right);
}

function merge(left, right) {
    return new Promise(resolve => {
        let result = [];

        function compare() {
            if (!left.length) {
                resolve(result.concat(right));
                return;
            }
            if (!right.length) {
                resolve(result.concat(left));
                return;
            }

            showBattle(left[0], right[0]);

            resolver = choice => {
                comparisons++;
                updateProgress();

                if (choice === 0) result.push(left.shift());
                else result.push(right.shift());

                compare();
            };
        }

        compare();
    });
}

function showBattle(a, b) {
    document.getElementById("results").innerHTML = "";

    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="choose(0)">
            <div class="song-title">${a.name}</div>
            ${a.spotify ? `
            <iframe src="https://open.spotify.com/embed/track/${a.spotify}"
                frameborder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen">
            </iframe>` : "<p>Spotify nuorodos nėra</p>"}
        </div>

        <div class="song" onclick="choose(1)">
            <div class="song-title">${b.name}</div>
            ${b.spotify ? `
            <iframe src="https://open.spotify.com/embed/track/${b.spotify}"
                frameborder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen">
            </iframe>` : "<p>Spotify nuorodos nėra</p>"}
        </div>
    `;
}

function showResults(sorted) {
    document.getElementById("battle").innerHTML = "";
    document.getElementById("progress").innerHTML = "";

    let html = "<h2>🏆 Tavo Galutinis TOP</h2>";
    sorted.forEach((item, i) => {
        html += `<p>${i + 1}. ${item.name}</p>`;
    });

    document.getElementById("results").innerHTML = html;
}

async function start() {
    totalComparisons = estimateComparisons(items.length);
    comparisons = 0;
    updateProgress();

    const sorted = await interactiveMergeSort([...items]);
    showResults(sorted);
}

function restart() {
    document.getElementById("results").innerHTML = "";
    document.getElementById("battle").innerHTML = "";
    start();
}

start();
</script>

</body>
</html>
