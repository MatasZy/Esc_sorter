<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC 2026 YouTube Sorter</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #111, #1e0033);
    color: white;
    padding: 20px;
}

.song {
    display: inline-block;
    width: 300px;
    padding: 15px;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    transition: 0.2s;
    vertical-align: top;
    cursor: pointer;
}

.song:hover {
    background: rgba(255,255,255,0.2);
}

.song-title {
    font-size: 16px;
    margin-bottom: 10px;
}

iframe {
    border-radius: 12px;
    width: 100%;
    height: 250px;
}

#progress {
    margin-top: 15px;
    opacity: 0.8;
}

#results {
    margin-top: 25px;
}

@media (max-width: 600px) {
    .song {
        width: 90%;
        margin: 10px auto;
    }
}
</style>
</head>

<body>

<h1>🎤 Eurovizijos 2026 Sorter (YouTube)</h1>
<p>Paklausyk klipą ir pasirink labiau patinkančią dainą</p>

<div id="battle"></div>
<div id="progress"></div>
<div id="results"></div>

<script>
let items = [
    { name: "🇦🇱 Albania — Alis — Nán", youtube: "VIDEO_ID_ALBANIA" },
    { name: "🇦🇺 Australia — Delta Goodrem — Eclipse", youtube: "VIDEO_ID_AUSTRALIA" },
    { name: "🇦🇹 Austria — Cosmó — Tanzschein", youtube: "VIDEO_ID_AUSTRIA" },
    { name: "🇧🇪 Belgium — Essyla — Dancing On The Ice", youtube: "VIDEO_ID_BELGIUM" },
    { name: "🇧🇬 Bulgaria — Dara — Bangaranga", youtube: "VIDEO_ID_BULGARIA" },
    { name: "🇭🇷 Croatia — Lelek — Andromeda", youtube: "VIDEO_ID_CROATIA" },
    { name: "🇨🇾 Cyprus — Antigoni — Jalla", youtube: "VIDEO_ID_CYPRUS" },
    { name: "🇩🇰 Denmark — Søren Torpegaard Lund — Før Vi Går Hjem", youtube: "VIDEO_ID_DENMARK" },
    { name: "🇪🇪 Estonia — Vanilla Ninja — Too Epic To Be True", youtube: "VIDEO_ID_ESTONIA" },
    { name: "🇫🇮 Finland — Linda & Pete — Liekinheitin", youtube: "VIDEO_ID_FINLAND" },
    { name: "🇩🇪 Germany — Sarah Engels — Fire", youtube: "VIDEO_ID_GERMANY" },
    { name: "🇬🇷 Greece — Akylas — Ferto", youtube: "VIDEO_ID_GREECE" },
    { name: "🇮🇹 Italy — Sal Da Vinci — Per Sempre Si", youtube: "VIDEO_ID_ITALY" },
    { name: "🇱🇻 Latvia — Atvara — Ēnā", youtube: "VIDEO_ID_LATVIA" },
    { name: "🇱🇹 Lithuania — Lion Ceccah — Sólo Quiero Más", youtube: "VIDEO_ID_LITHUANIA" },
    { name: "🇱🇺 Luxembourg — Eva Marija — Mother Nature", youtube: "VIDEO_ID_LUXEMBOURG" },
    { name: "🇲🇹 Malta — Aidan — Bella", youtube: "VIDEO_ID_MALTA" },
    { name: "🇲🇩 Moldova — Satoshi — Viva, Moldova!", youtube: "VIDEO_ID_MOLDOVA" },
    { name: "🇲🇪 Montenegro — Tamara Živković — Nova Zora", youtube: "VIDEO_ID_MONTENEGRO" },
    { name: "🇳🇴 Norway — Jonas Lovv — Ya Ya Ya", youtube: "VIDEO_ID_NORWAY" },
    { name: "🇷🇸 Serbia — Lavina — Kraj Mene", youtube: "VIDEO_ID_SERBIA" },
    { name: "🇺🇦 Ukraine — Lelėka — Ridnym", youtube: "VIDEO_ID_UKRAINE" }
];

let totalComparisons = 0;
let comparisons = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function estimateComparisons(n) {
    return Math.ceil(n * Math.log2(n));
}

async function interactiveMergeSort(arr) {
    if (arr.length <= 1) return arr;
    const mid = Math.floor(arr.length / 2);
    const left = await interactiveMergeSort(arr.slice(0, mid));
    const right = await interactiveMergeSort(arr.slice(mid));
    return await merge(left, right);
}

function merge(left, right) {
    return new Promise(resolve => {
        let result = [];
        function compare() {
            if (!left.length) {
                resolve(result.concat(right));
                return;
            }
            if (!right.length) {
                resolve(result.concat(left));
                return;
            }
            showBattle(left[0], right[0], choice => {
                comparisons++;
                updateProgress();
                if (choice === 0) result.push(left.shift());
                else result.push(right.shift());
                compare();
            });
        }
        compare();
    });
}

function showBattle(a, b, callback) {
    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="choose(0)">
            <div class="song-title">${a.name}</div>
            <iframe src="https://www.youtube.com/embed/${a.youtube}?rel=0"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <div class="song" onclick="choose(1)">
            <div class="song-title">${b.name}</div>
            <iframe src="https://www.youtube.com/embed/${b.youtube}?rel=0"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>
    `;
    window.choose = callback;
}

function updateProgress() {
    document.getElementById("progress").innerText =
        "Progresas: " + Math.round((comparisons / totalComparisons) * 100) + "%";
}

function showResults(sorted) {
    document.getElementById("battle").innerHTML = "";
    document.getElementById("progress").innerHTML = "";
    let html = "<h2>🏆 Tavo Galutinis TOP</h2>";
    sorted.forEach((item, i) => {
        html += `<p>${i + 1}. ${item.name}</p>`;
    });
    document.getElementById("results").innerHTML = html;
}

async function start() {
    shuffle(items);
    totalComparisons = estimateComparisons(items.length);
    comparisons = 0;
    updateProgress();
    const sorted = await interactiveMergeSort(items);
    showResults(sorted);
}

start();
</script>

</body>
</html>
