<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurovizijos 2026 – Pairwise Sorter</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
    padding: 20px;
}
.song {
    display: inline-block;
    width: 40%;
    padding: 20px;
    margin: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}
.song:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.05);
}
button {
    padding: 10px 20px;
    margin-top: 20px;
    background: #ff0080;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
#progress {
    margin-top: 15px;
    opacity: 0.8;
}
</style>
</head>
<body>

<h1>🎤 Eurovizijos 2026 – Pairwise Sorter</h1>
<p>Rinkis, kuri šalis tau labiau patinka 👇</p>

<div id="battle"></div>
<div id="progress"></div>
<div id="results"></div>
<button onclick="restart()">Pradėti iš naujo</button>

<script>
let songs = [
    "🇱🇹 Lietuva", "🇸🇪 Švedija", "🇳🇴 Norvegija",
    "🇫🇮 Suomija", "🇮🇹 Italija", "🇪🇸 Ispanija",
    "🇫🇷 Prancūzija", "🇩🇪 Vokietija"
];

// taškai = kiek kartų laimėta
let scores = {};
// visos poros head-to-head
let pairs = [];
let current = 0;

// Suformuojame visų porų sąrašą
function generatePairs() {
    pairs = [];
    for (let i = 0; i < songs.length; i++) {
        for (let j = i + 1; j < songs.length; j++) {
            pairs.push([songs[i], songs[j]]);
        }
    }
}

// Startuoju naują sesiją
function start() {
    scores = {};
    songs.forEach(s => scores[s] = 0);
    generatePairs();
    current = 0;
    showNext();
}

function showNext() {
    if (current >= pairs.length) {
        showResults();
        return;
    }
    let [a, b] = pairs[current];
    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="vote('${a}', '${b}')">${a}</div>
        <div class="song" onclick="vote('${b}', '${a}')">${b}</div>
    `;
    document.getElementById("progress").innerText =
        "Progress: " + (current + 1) + " / " + pairs.length;
}

// Kai turi pasirinkimą
function vote(winner, loser) {
    scores[winner]++; // daugiau laimėjimų
    current++;
    showNext();
}

function showResults() {
    document.getElementById("battle").innerHTML = "";
    document.getElementById("progress").innerHTML = "";

    let sorted = Object.entries(scores)
        .sort((a,b) => b[1] - a[1]);

    let html = `<h2>🏆 Tavo Reitingas</h2>`;
    sorted.forEach((entry, i) => {
        html += `<p>${i+1}. ${entry[0]} — ${entry[1]} laimėjimai</p>`;
    });
    document.getElementById("results").innerHTML = html;
}

function restart() {
    document.getElementById("results").innerHTML = "";
    start();
}

start();
</script>

</body>
</html>
