<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC 2026 Sorter</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #111, #1e0033);
    color: white;
    padding: 20px;
}

.song {
    display: inline-block;
    width: 300px;
    min-height: 40px;
    padding: 20px 20px 60px 20px;
    margin: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 16px;
    transition: 0.2s;
    vertical-align: top;
    cursor: pointer;
}

.song:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.03);
}

.song-title {
    font-size: 17px;
    margin-bottom: 15px;
}

.spotify-wrapper {
    display: flex;
    justify-content: center;
}

.spotify-frame {
    border-radius: 12px;
    width: 100%;
    height: 80px;
}

.youtube-frame {
    border-radius: 12px;
    width: 100%;
    height: 140px;
}

#progress {
    margin-top: 15px;
    opacity: 0.8;
}

#results {
    margin-top: 25px;
}

@media (max-width: 700px) {
    .song {
        width: 90%;
        margin: 15px auto;
    }
}
</style>
</head>

<body>

<h1>🎤 Eurovizijos 2026 Sorter</h1>
<p>Paklausyk ir pasirink labiau patinkančią dainą</p>

<div id="battle"></div>
<div id="progress"></div>
<div id="results"></div>

<script>
let items = [
    { name: "🇦🇱 ALBANIA — Alis — Nán", spotify: "40vsOMljwhHCibpToRULGo" },
    { name: "🇦🇺 AUSTRALIA — Delta Goodrem — Eclipse", spotify: "2pJ0Ji9nkohwuKMuyNhiwo" },
    { name: "🇦🇹 AUSTRIA — Cosmó — Tanzschein", spotify: "6P4wvzxJJZR7cVs1kFXL3q" },
    { name: "🇧🇪 BELGIUM — Essyla — Dancing On The Ice", spotify: "1u0WYHtNFrAyzgybCDK861" },
    { name: "🇧🇬 BULGARIA — Dara — Bangaranga", spotify: "6SvlfrQYzUsW5UQUpUpy26", youtube: "b3tLOikocQQ" },
    { name: "🇭🇷 CROATIA — Lelek — Andromeda", spotify: "3bTsAnErZrtBoUfORcTDTo" },
    { name: "🇨🇾 CYPRUS — Antigoni — Jalla", spotify: "1h2xmg6pH7r5pr2prKmWGc" },
    { name: "🇩🇰 DENMARK — Søren Torpegaard Lund — Før Vi Går Hjem", spotify: "6KnX2pkecFELGtegM26ezf" },
    { name: "🇪🇪 ESTONIA — Vanilla Ninja — Too Epic To Be True", spotify: "3Js1kS52KXZsmRU6qFLH60" },
    { name: "🇫🇮 FINLAND — Linda & Pete — Liekinheitin", spotify: "0k2NxIVax5tnGSCeruFyEL" },
    { name: "🇫🇷 FRANCE — Monroe — Regarde", spotify: "6cjjQg0SAlX7ahvYWuRPXz" },
    { name: "🇩🇪 GERMANY — Sarah Engels — Fire", spotify: "2j5D20BxsN7xl11KcnLyHP" },
    { name: "🇬🇷 GREECE — Akylas — Ferto", spotify: "0LStLUCQgbv6WIEO2fFAO5" },
    { name: "🇮🇱 ISRAEL — Noam Bettan — Michelle", spotify: "22g4vKHFze17AV7vnequhG" },
    { name: "🇮🇹 ITALY — Sal Da Vinci — Per Sempre Si", spotify: "5W1mx7Oeg2HxmASrth1nTt" },
    { name: "🇱🇻 LATVIA — Atvara — Ēnā", spotify: "5jrN6fnBH38Bh0IQJnjiUJ" },
    { name: "🇱🇹 LITHUANIA — Lion Ceccah — Sólo Quiero Más", spotify: "1av4wp2KoCwn9P151n45WV" },
    { name: "🇱🇺 LUXEMBOURG — Eva Marija — Mother Nature", spotify: "4kYfZeuXXmCWLvhnPIjyr1" },
    { name: "🇲🇹 MALTA — Aidan — Bella", spotify: "6xMZVKtQ76THTiJBntzmwz" },
    { name: "🇲🇩 MOLDOVA — Satoshi — Viva, Moldova!", spotify: "2VTs9LHYLLfhO9hmr7xqGy" },
    { name: "🇲🇪 MONTENEGRO — Tamara Živković — Nova Zora", spotify: "0L0FTVtuh7tVHSfdYzztmL" },
    { name: "🇳🇴 NORWAY — Jonas Lovv — Ya Ya Ya", spotify: "0BDJRKqx8Qj6EmM5o9P5Vr" },
    { name: "🇵🇱 POLAND — Alicja — Pray", spotify: "7yT5rUvzEQh60Olh2GXShd" },
    { name: "🇵🇹 PORTUGAL — Bandidos do Cante — Rosa", spotify: "03Oz6PWplRogAQJgnFuoJ7" },
    { name: "🇷🇴 ROMANIA — Alexandra Căpitănescu — Choke Me", spotify: "0itI8ykSUDp4dfwiHY6fnw" },
    { name: "🇸🇲 SAN MARINO — Senhit & Boy George — Superstar", spotify: "5fYAsg12ms7UkZLtEmS4J6" },
    { name: "🇷🇸 SERBIA — Lavina — Kraj Mene", spotify: "3cnVAUGWZcXNqojO8PfYOu" },
    { name: "🇸🇪 SWEDEN — Felicia — My System", spotify: "1XmLPHkuv95o5NUodggzfv" },
    { name: "🇬🇧 UNITED KINGDOM — Look Mum No Computer — Eins, Zwei, Drei", spotify: "26xlJAlQoCMbnAWd0sGCQf" },
    { name: "🇺🇦 UKRAINE — Lelėka — Ridnym", spotify: "52IlNxHUoQ3ZZyw9atSGVN" }
];


let totalComparisons = 0;
let comparisons = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function countComparisons(n) {
    if (n <= 1) return 0;
    const mid = Math.floor(n / 2);
    return countComparisons(mid)
         + countComparisons(n - mid)
         + (n - 1);
}

async function interactiveMergeSort(arr) {
    if (arr.length <= 1) return arr;

    const mid = Math.floor(arr.length / 2);
    const left = await interactiveMergeSort(arr.slice(0, mid));
    const right = await interactiveMergeSort(arr.slice(mid));

    return await merge(left, right);
}

function merge(left, right) {
    return new Promise(resolve => {
        let result = [];

        function compare() {
            if (!left.length) return resolve(result.concat(right));
            if (!right.length) return resolve(result.concat(left));

            showBattle(left[0], right[0], choice => {
                comparisons++;
                updateProgress();

                if (choice === 0) result.push(left.shift());
                else result.push(right.shift());

                compare();
            });
        }

        compare();
    });
}

function renderPlayer(item) {
    if (item.spotify) {
        return `<iframe class="spotify-frame"
            src="https://open.spotify.com/embed/track/${item.spotify}"
            frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen"></iframe>`;
    } else if (item.youtube) {
        return `<iframe class="youtube-frame"
            src="https://www.youtube.com/embed/${item.youtube}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>`;
    } else {
        return "<p>Nuoroda nepridėta</p>";
    }
}

function showBattle(a, b, callback) {
    document.getElementById("battle").innerHTML = `
        <div class="song" onclick="choose(0)">
            <div class="song-title">${a.name}</div>
            <div class="spotify-wrapper" onclick="event.stopPropagation()">
                ${renderPlayer(a)}
            </div>
        </div>

        <div class="song" onclick="choose(1)">
            <div class="song-title">${b.name}</div>
            <div class="spotify-wrapper" onclick="event.stopPropagation()">
                ${renderPlayer(b)}
            </div>
        </div>
    `;
    window.choose = callback;
}

function updateProgress() {
    let percent = Math.round((comparisons / totalComparisons) * 100);
    if (percent > 100) percent = 100;
    document.getElementById("progress").innerText =
        "Progresas: " + percent + "%";
}

function showResults(sorted) {
    comparisons = totalComparisons;
    updateProgress();

    document.getElementById("battle").innerHTML = "";

    let html = "<h2>🏆 Tavo Galutinis TOP</h2>";

    sorted.forEach((item, i) => {
        html += `<p>${i + 1}. ${item.name}</p>`;
    });

    const countryList = sorted.map(item =>
        item.name.split("—")[0]
            .replace(/[^\p{L}\s]/gu, "")
            .trim()
            .toLowerCase()
    );

    const submitLine = `!submit 2026 ${countryList.join(", ")}`;

    html += `
        <div style="margin-top:25px; padding:15px; background:rgba(255,255,255,0.1); border-radius:12px;">
            <strong>Submit eilutė:</strong><br><br>
            <code id="submitText" style="word-break: break-word; display:block; margin-bottom:10px;">
                ${submitLine}
            </code>
            <button onclick="copySubmit()" 
                style="padding:8px 16px; border:none; border-radius:8px; cursor:pointer; background:#ff2fd1; color:white;">
                📋 Kopijuoti
            </button>
            <div id="copyFeedback" style="margin-top:8px; font-size:14px; opacity:0;"></div>
        </div>
    `;

    document.getElementById("results").innerHTML = html;
}

function copySubmit() {
    const text = document.getElementById("submitText").innerText;
    navigator.clipboard.writeText(text).then(() => {
        const feedback = document.getElementById("copyFeedback");
        feedback.innerText = "✅ Nukopijuota!";
        feedback.style.opacity = "1";

        setTimeout(() => {
            feedback.style.opacity = "0";
        }, 2000);
    });
}
    
async function start() {
    let randomizedItems = [...items];
    shuffle(randomizedItems);

    totalComparisons = countComparisons(randomizedItems.length);
    comparisons = 0;
    updateProgress();

    const sorted = await interactiveMergeSort(randomizedItems);
    showResults(sorted);
}

start();

</script>

</body>
</html>
